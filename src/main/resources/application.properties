spring.application.name=komm
server.port=8085

# Trust X-Forwarded-* headers from the reverse proxy (nginx) so getRemoteAddr()
# and rate limiting see the real client IP instead of the proxy's. Only safe
# because port 8085 is reachable only through the proxy — never expose it directly.
server.forward-headers-strategy=framework

# JPA Configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update

# JWT and CA Configuration
jwt.keys.directory=keys
jwt.keys.private=keys/kommhub-private.pem
jwt.keys.public=keys/kommhub-public.pem
jwt.ca.cert-file=keys/kommhub-ca.crt
jwt.ca.cn=KommHub CA
jwt.ca.org=KommHub
jwt.ca.country=IT
jwt.ca.validity-days=3650
jwt.access-token.expiration=900
jwt.refresh-token.expiration=2592000
jwt.issuer=komm
# Browsers get the refresh token as an HttpOnly cookie (see AuthController).
# Secure restricts it to HTTPS; browsers still accept it on localhost, so only
# disable this if the hub is served over plain HTTP on another host.
jwt.refresh-cookie.secure=true

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=KommHikariPool

# Installation (komm-server) jar — served by InstallationController as kommserver-<id>.jar
kommhub.jar.path=jar/latest.jar
kommhub.jar.properties-entry=BOOT-INF/classes/application.properties
kommhub.jar.manifest-path=META-INF/kommserver.mf
kommhub.jar.manifest-token-attr=Kommserver-Setup-Token

# Desktop client (komm) jar — served by ClientUpdateController (/api/client/*).
# This is the shaded JavaFX fat jar (no BOOT-INF), so its app.properties sits at
# the classpath root. client.version is read from that entry — the jar is
# self-describing, so deploying a new version is just replacing this file
# (upload to a temp name, then rename, so downloads never see a partial jar;
# the client repo's release workflow does this automatically over SSH).
kommhub.client.jar.path=jar/komm-client.jar
kommhub.client.properties-entry=app.properties

app.avatars.dir=uploads/avatars/users
app.upload.avatars.servers=uploads/avatars/servers
app.dm.attachments.dir=uploads/dm/attachments

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=12MB


# ── Closed beta ─────────────────────────────────────────────────────────────
# When true, /api/auth/register requires an unused beta key (see BetaKeyService).
# Self-hosted hubs should leave this off; the official hub turns it on in
# application-local.properties. Keys are generated by a SUPER_ADMIN from the
# website dashboard (POST /api/admin/beta-keys).
komm.beta.enabled=false

# Accounts that never verify their email are deleted after this many days,
# freeing their username/email and deleting the beta key they consumed.
app.unverified-accounts.retention-days=7
app.unverified-accounts.cleanup-interval-ms=3600000

# ── Public site (kommvoice.com) ─────────────────────────────────────────────
# These defaults describe the official Komm site. If you fork the hub and run
# your own, override any of them in application-local.properties.
# Canonical base URL used for SEO tags (canonical, Open Graph, JSON-LD).
komm.site.base-url=https://kommvoice.com

# GitHub repositories. Download links below derive from these, so updating a
# repo URL here updates every download button on the site.
komm.site.github.client=https://github.com/B077AS/komm
komm.site.github.server=https://github.com/B077AS/komm-server
komm.site.github.hub=https://github.com/B077AS/komm-hub
komm.site.github.launcher=https://github.com/B077AS/komm-launcher

# Download links — point at the latest GitHub release assets. The installer and
# AppImage (launcher + bundled client seed + JRE) are published on the CLIENT
# repo's releases by its release workflow, which uploads them under these stable
# alias names alongside the versioned files, so latest/download always works.
# The hub is not offered as a download — developers build it from source. The
# plain server JAR carries no verification token.
komm.site.downloads.client-windows=${komm.site.github.client}/releases/latest/download/Komm-Setup.exe
komm.site.downloads.client-linux=${komm.site.github.client}/releases/latest/download/Komm.AppImage
komm.site.downloads.server=${komm.site.github.server}/releases/latest/download/komm-server.jar

# ── Secrets & deployment-specific settings ──────────────────────────────────
# Everything sensitive or per-deployment (database credentials, mail account,
# GIF provider key, beta toggle, site overrides) lives in the gitignored
# application-local.properties — see application-local.properties.example.
spring.config.import=optional:classpath:application-local.properties

# Throw NoHandlerFoundException for unmatched routes so WebFallbackHandler can redirect them
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ── Rate limiting ───────────────────────────────────────────────────────────
# Token-bucket limits on /api/** (see RateLimitFilter). Authenticated requests
# are keyed per user, public ones per client IP.
komm.ratelimit.enabled=true
# Shadow mode: when false, breaches are only logged (no 429) so real traffic can
# be observed before enforcing. Flip to true to actually return 429.
komm.ratelimit.enforce=true