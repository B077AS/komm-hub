<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Forgot Password</title>
</head>

<th:block layout:fragment="body">
<div class="centered">
    <div class="container-sm">
        <a class="logo" href="/"><img th:src="@{/favicon.svg}" alt="Komm logo"> Komm</a>
        <div class="card">
            <h2 style="font-size:20px; font-weight:700; margin-bottom:6px; text-align:center;">Forgot your password?</h2>
            <p style="color:var(--fg-subtle); font-size:13px; text-align:center; margin-bottom:20px;">No worries — enter your email and we'll send you a reset link.</p>

            <div class="form-group">
                <label>Email</label>
                <div class="input-icon-wrap">
                    <i class="mdi mdi-email-outline"></i>
                    <input type="email" id="email" placeholder="Enter your email" autocomplete="email">
                </div>
            </div>
            <button class="btn btn-primary" onclick="requestReset()"><i class="mdi mdi-email-fast-outline"></i> Send Reset Link</button>
            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>
        </div>
        <div class="link-row">
            Remembered it after all? <a href="/login">Log In</a>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;

    document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') requestReset(); });

    async function requestReset() {
        const email = document.getElementById('email').value.trim();
        if (!email) { showErr('Please enter your email address.'); return; }

        const btn = document.querySelector('.btn-primary');
        btn.disabled = true;
        clearMessages();
        try {
            const resp = await fetch(API_BASE + '/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await resp.json();
            if (!resp.ok) { showErr(data.message || 'Could not send the reset email.'); btn.disabled = false; return; }
            showSuccess(data.message || 'If an account exists for that email, a reset link is on its way.');
        } catch (e) {
            showErr('Could not send the reset email. Please try again.');
            btn.disabled = false;
        }
    }

    function showErr(msg)     { const e = document.getElementById('error-msg');   e.textContent = msg; e.style.display = 'block'; }
    function showSuccess(msg) { const e = document.getElementById('success-msg'); e.textContent = msg; e.style.display = 'block'; }
    function clearMessages()  { document.getElementById('error-msg').style.display = 'none'; document.getElementById('success-msg').style.display = 'none'; }
</script>
</th:block>
</html>
