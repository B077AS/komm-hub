<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Reset Password</title>
</head>

<th:block layout:fragment="body">
<div class="centered">
    <div class="container-sm">
        <a class="logo" href="/"><img th:src="@{/favicon.svg}" alt="Komm logo"> Komm</a>
        <div class="card">
            <h2 style="font-size:20px; font-weight:700; margin-bottom:6px; text-align:center;">Choose a new password</h2>
            <p style="color:var(--fg-subtle); font-size:13px; text-align:center; margin-bottom:20px;">Enter a new password for your Komm account.</p>

            <div class="form-group">
                <label>New Password</label>
                <div class="input-icon-wrap">
                    <i class="mdi mdi-lock-outline"></i>
                    <input type="password" id="password" placeholder="Choose a password (min 6 chars)" autocomplete="new-password">
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-icon-wrap">
                    <i class="mdi mdi-lock-check-outline"></i>
                    <input type="password" id="password-confirm" placeholder="Repeat your new password" autocomplete="new-password">
                </div>
            </div>
            <button class="btn btn-primary" onclick="resetPassword()"><i class="mdi mdi-lock-reset"></i> Reset Password</button>
            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>
        </div>
        <div class="link-row">
            Link expired? <a href="/forgot-password">Request a new one</a>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin;
    const token = new URLSearchParams(window.location.search).get('token') || '';

    if (!token) {
        showErr('This reset link is invalid. Please request a new one.');
        document.querySelector('.btn-primary').disabled = true;
    }

    document.getElementById('password-confirm').addEventListener('keydown', e => { if (e.key === 'Enter') resetPassword(); });

    async function resetPassword() {
        const password = document.getElementById('password').value;
        const confirm  = document.getElementById('password-confirm').value;
        if (!password || !confirm) { showErr('Please fill in both fields.'); return; }
        if (password.length < 6)   { showErr('Password must be at least 6 characters.'); return; }
        if (password !== confirm)  { showErr('Passwords do not match.'); return; }

        const btn = document.querySelector('.btn-primary');
        btn.disabled = true;
        clearMessages();
        try {
            const resp = await fetch(API_BASE + '/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newPassword: password })
            });
            const data = await resp.json();
            if (!resp.ok) { showErr(data.message || 'Password reset failed.'); btn.disabled = false; return; }
            showSuccess('Password updated! Redirecting to login…');
            setTimeout(() => { window.location.href = '/login'; }, 1500);
        } catch (e) {
            showErr('Password reset failed. Please try again.');
            btn.disabled = false;
        }
    }

    function showErr(msg)     { const e = document.getElementById('error-msg');   e.textContent = msg; e.style.display = 'block'; }
    function showSuccess(msg) { const e = document.getElementById('success-msg'); e.textContent = msg; e.style.display = 'block'; }
    function clearMessages()  { document.getElementById('error-msg').style.display = 'none'; document.getElementById('success-msg').style.display = 'none'; }
</script>
</th:block>
</html>
